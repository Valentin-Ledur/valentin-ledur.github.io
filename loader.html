<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <div class="grid-container">
        <!-- Menu -->
        <div id="menu-container" class="grid-menu text-center">
            <div id="pages"></div>
            <div id="menu-input" class="">
                <input type="file" id="obj" accept=".obj">
                <input type="file" id="texture" accept="image/*">
            </div>
        </div>

        <!-- Affichage du menu selectionné -->
        <div class="grid-body center">
            <canvas id="canvas-container"></canvas>
        </div>
    </div>
    <!-- Recuperation du menu -->
    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById("pages").innerHTML = data;
            });
    </script>
    <script type="module" src="script/test.js"></script>
</body>

</html>
