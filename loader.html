<!DOCTYPE html>
<html lang="fr" class="background text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/menu.css">
    <link rel="stylesheet" href="style/color.css">
</head>

<body>
    <div class="grid-container">
        <!-- Menu -->
        <div id="menu-container" class="grid-menu menu-background">
            <div id="pages"></div>
            <div id="menu-input" class="file-inputs-container">
                <div class="input-group">
                    <label for="obj">Modèle (.obj uniquement)</label>
                    <input type="file" id="obj" accept=".obj">
                </div>

                <div class="input-group">
                    <label for="texture">Texture (n'importe quelle image)</label>
                    <input type="file" id="texture" accept="image/*">
                </div>

                <button id="start-renderer" class="menu-load-button">Afficher le modèle</button>
            </div>
        </div>

        <!-- Affichage du menu selectionné -->
        <div class="grid-body center">
            <div class="text-block text-center">
                <h1>Chargeur de fichier obj avec texture</h1>
                <p class="text-left"> Sur cette page, vous pouvez charger un modèle à partir d'un fichier .obj et d'une
                    texture de n'importe quel format, depuis le menu situé à gauche sur PC et dans le menu déroulant en
                    haut sur mobile.
                </p>
            </div>
            <canvas id="canvas-container"></canvas>
        </div>
    </div>
    <!-- Recuperation du menu -->
    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById("pages").innerHTML = data;

                const btn = document.getElementById('menu-toggle');
                const list = document.getElementById('menu-links');

                if (btn && list) {
                    btn.addEventListener('click', () => {
                        list.classList.toggle('active');
                    });
                }
            });
    </script>
    <script type="module" src="script/loader.js"></script>
</body>

</html>
