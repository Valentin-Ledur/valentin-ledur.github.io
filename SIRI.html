<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div class="grid-container">
        <!-- Menu -->
        <div id="menu-container" class="grid-menu text-center"></div>
        <!-- Affichage du menu selectionné -->
        <div class="grid-body center"> 
            <div id="canvas-container"></div>
        </div>
    </div>
    <!-- Recuperation du menu -->
    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('menu-container').innerHTML = data;
            });
    </script>
    <script type="module" src="script/script.js"></script>
</body>

</html>
