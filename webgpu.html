<!DOCTYPE html>
<html lang="fr" class="background text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/menu.css">
    <link rel="stylesheet" href="style/color.css">
</head>

<body>
    <div class="grid-container">
        <!-- Menu -->
        <div id="menu-container" class="grid-menu menu-background">
            <div id="pages"></div>
        </div>
        <!-- Affichage du menu selectionné -->
        <div class="grid-body center">
            <div class="text-block text-center">
                <h1>Moteur de rendu avec WebGPU</h1>
                <p class="text-left"> Sur cette page se trouvent mes tests de création d'un moteur de rendu en
                    JavaScript à l'aide de l'API WebGPU. Vous pouvez vous déplacer dans la scène à l'aide des touches
                    ZQSD ou WASD, et orienter la caméra en maintenant le clic gauche de la souris tout en la déplaçant.
                </p>
            </div>
            <canvas id="canvas-container"></canvas>
        </div>
    </div>
    <!-- Recuperation du menu -->
    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById("pages").innerHTML = data;

                const btn = document.getElementById('menu-toggle');
                const list = document.getElementById('menu-links');

                if (btn && list) {
                    btn.addEventListener('click', () => {
                        list.classList.toggle('active');
                    });
                }
            });
    </script>
    <script type="module" src="script/webgpu.js"></script>
</body>

</html>
